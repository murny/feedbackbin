#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production: &production
  # Application cleanup
  cleanup_expired_sessions:
    command: "Session.cleanup_expired"
    schedule: every hour at minute 15

  cleanup_expired_invitations:
    command: "Invitation.cleanup_expired"
    schedule: every hour at minute 25

  cleanup_old_events:
    command: "Event.cleanup_old"
    schedule: every day at 03:00

  # Operations cleanup - Solid Queue maintenance
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 10

  clear_solid_queue_recurring_executions:
    command: "SolidQueue::RecurringExecution.clear_in_batches"
    schedule: every hour at minute 50

development: *production
test: *production
